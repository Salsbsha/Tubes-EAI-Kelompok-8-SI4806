<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAI Hospital System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>EAI Hospital System</h1>
            <p>Microservices Integration Demonstration</p>
        </header>

        <main class="grid">
            <!-- Pendaftaran Pasien -->
            <section class="glass-card">
                <h2>1. Registrasi Pasien</h2>
                <form id="registerForm">
                    <div class="input-group">
                        <label for="nama">Nama Pasien</label>
                        <input type="text" id="nama" placeholder="Masukkan nama..." required>
                    </div>
                    <div class="input-group">
                        <label for="alamat">Alamat</label>
                        <input type="text" id="alamat" placeholder="Masukkan alamat..." required>
                    </div>
                    <button type="submit" class="btn primary">Daftar Pasien</button>
                </form>
                <div id="registerAlert" class="alert hidden"></div>
            </section>

            <!-- Resep Obat -->
            <section class="glass-card">
                <h2>2. Resep Farmasi</h2>
                <form id="resepForm">
                    <div class="input-group">
                        <label for="id_pasien">ID Pasien</label>
                        <input type="text" id="id_pasien" placeholder="Contoh: PAS-1234" required>
                    </div>
                    <div class="input-group">
                        <label for="kode_obat">Pilih Obat</label>
                        <select id="kode_obat" required>
                            <option value="" disabled selected>Pilih Obat...</option>
                            <option value="OBT-001">Paracetamol 500mg (Rp5.000)</option>
                            <option value="OBT-002">Amoxicillin (Rp15.000)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="jumlah">Jumlah Obat</label>
                        <input type="number" id="jumlah" min="1" max="10" value="1" required>
                    </div>
                    <button type="submit" class="btn secondary">Kirim Resep</button>
                </form>
                <div id="resepAlert" class="alert hidden"></div>
            </section>

            <!-- Cek Tagihan -->
            <section class="glass-card full-width">
                <h2>3. Cek Tagihan Akhir (Billing)</h2>
                <div class="search-bar">
                    <input type="text" id="search_id" placeholder="Masukkan ID Pasien (Contoh: PAS-1234)">
                    <button id="btnSearch" class="btn accent">Cek Tagihan</button>
                </div>
                
                <div id="billingResult" class="billing-result hidden">
                    <div class="billing-header">
                        <h3>Nota Tagihan</h3>
                        <span id="bill_id" class="badge"></span>
                    </div>
                    <table id="billTable">
                        <thead>
                            <tr>
                                <th>Keterangan</th>
                                <th>Jumlah</th>
                            </tr>
                        </thead>
                        <tbody id="billBody">
                            <!-- Injected via JS -->
                        </tbody>
                        <tfoot>
                            <tr>
                                <th>Total Tagihan</th>
                                <th id="billTotal" class="total-amount">Rp 0</th>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
